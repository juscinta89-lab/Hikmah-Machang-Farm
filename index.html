  <script>
// ==========================================
// 1. KONFIGURASI FIREBASE (GANTIKAN INI!)
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyD60OE4KtSgZJktgYfIulrmHozELemXqQw",
  authDomain: "hikmah-pos-6290f.firebaseapp.com",
  projectId: "hikmah-pos-6290f",
  storageBucket: "hikmah-pos-6290f.firebasestorage.app",
  messagingSenderId: "964156564208",
  appId: "1:964156564208:web:90dfdcb2989b7d1cd61835",
  measurementId: "G-PF566F81Q7"
};

// Inisialisasi Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ==========================================
// 2. STATE & PEMBOLEHUBAH
// ==========================================
let currentUser = null;
let currentPage = 'dashboard';
let cart = [];
let allOrders = [];
let invoiceCounter = 1;
let products = [];

// ==========================================
// 3. AUTHENTICATION LOGIC
// ==========================================
function handleAdminLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  
  // Login khusus Admin seperti yang diminta
  if (u === 'admin' && p === 'admin2026') {
    currentUser = { username: 'Admin Utama', role: 'Admin', photoURL: `https://ui-avatars.com/api/?name=Admin&background=15803d&color=fff` };
    completeLoginProcess();
  } else {
    showAuthError('Kredensial Admin salah. Sila cuba lagi.');
  }
}

function handleGoogleLogin() {
  auth.signInWithPopup(googleProvider)
    .then((result) => {
      const user = result.user;
      currentUser = { 
        username: user.displayName, 
        email: user.email, 
        role: 'Staff', 
        photoURL: user.photoURL 
      };
      completeLoginProcess();
    })
    .catch((error) => {
      showAuthError(error.message);
    });
}

function showAuthError(msg) {
  const err = document.getElementById('loginError');
  err.textContent = msg;
  err.classList.remove('hidden');
}

function completeLoginProcess() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('currentUserRole').textContent = currentUser.role;
  document.getElementById('userAvatar').src = currentUser.photoURL;
  
  const settingsBtn = document.getElementById('settingsBtn');
  settingsBtn.style.display = (currentUser.role === 'Admin') ? 'flex' : 'none';
  
  initRealtimeListeners();
  navigateTo('dashboard');
  lucide.createIcons();
}

function handleLogout() {
  auth.signOut().then(() => {
    currentUser = null;
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').classList.add('hidden');
  });
}

// ==========================================
// 4. FIREBASE REALTIME LISTENERS
// ==========================================
function initRealtimeListeners() {
  // Listen to Products
  db.collection("products").onSnapshot((snapshot) => {
    products = [];
    snapshot.forEach((doc) => {
      products.push({ id: doc.id, ...doc.data() });
    });
    
    // Jika DB kosong (First time run), masukkan data default
    if (products.length === 0) {
      seedDefaultProducts();
    }
    
    if(currentPage === 'pos') renderPOSProducts();
    if(currentPage === 'products' || currentPage === 'settings') renderProductsList(); // Gabung render
  });

  // Listen to Orders (History)
  db.collection("orders").orderBy("created_at", "desc").onSnapshot((snapshot) => {
    allOrders = [];
    snapshot.forEach((doc) => {
      allOrders.push({ id: doc.id, ...doc.data() });
    });
    
    invoiceCounter = allOrders.length + 1;
    
    updateDashboardStats();
    if (currentPage === 'history') renderHistory();
    if (currentPage === 'customers') renderCustomers();
    if (currentPage === 'delivery') renderDelivery();
    if (currentPage === 'dashboard') renderRecentTransactions();
  });
}

function seedDefaultProducts() {
  const defaultProds = [
    { name: 'Lembu Grade A', desc: '250-300kg', price: 8500, stock: 12, active: true, emoji: '🐂' },
    { name: 'Lembu Grade B', desc: '200-250kg', price: 6500, stock: 8, active: true, emoji: '🐄' },
    { name: 'Kambing', desc: 'Kambing dewasa', price: 1200, stock: 25, active: true, emoji: '🐐' },
  ];
  defaultProds.forEach(p => db.collection("products").add(p));
}

// ==========================================
// 5. UPDATE CHECKOUT UNTUK GUNA FIREBASE
// ==========================================
async function processCheckout(e) {
  e.preventDefault();
  const btn = document.getElementById('processBtn');
  btn.disabled = true;
  btn.textContent = 'Memproses...';

  const total = cart.reduce((s, c) => { const p = products.find(x => x.id === c.id); return s + (p.price * c.qty); }, 0);
  const payType = document.getElementById('paymentType').value;
  const deposit = payType === 'deposit' ? (parseFloat(document.getElementById('depositAmount').value) || 0) : total;
  const balance = total - deposit;
  const invNo = 'HMF-' + String(Date.now()).slice(-6) + '-' + String(invoiceCounter).padStart(3,'0');

  const items = cart.map(c => { const p = products.find(x => x.id === c.id); return { id: p.id, name: p.name, qty: c.qty, price: p.price, subtotal: p.price * c.qty }; });

  const order = {
    type: 'order',
    buyer_name: document.getElementById('buyerName').value,
    buyer_phone: document.getElementById('buyerPhone').value,
    buyer_address: document.getElementById('buyerAddress').value,
    delivery_date: document.getElementById('deliveryDate').value,
    notes: document.getElementById('buyerNotes').value,
    items: items,
    total_amount: total,
    payment_type: payType,
    deposit_amount: deposit,
    balance: balance,
    status: payType === 'full' ? 'paid' : 'deposit',
    invoice_number: invNo,
    created_at: new Date().toISOString(),
    created_by: currentUser.username
  };

  try {
    // Save Order
    await db.collection("orders").add(order);
    
    // Tolak Stok dari Firebase
    const batch = db.batch();
    items.forEach(item => {
      const pRef = db.collection("products").doc(item.id);
      const currentStock = products.find(p => p.id === item.id).stock;
      batch.update(pRef, { stock: Math.max(0, currentStock - item.qty) });
    });
    await batch.commit();

    btn.disabled = false;
    btn.textContent = 'Proses Pembayaran';
    
    showInvoice(order, items);
    cart = [];
    document.getElementById('checkoutForm').reset();
    showToast('Transaksi berjaya disimpan di Firebase!', 'success');
  } catch (error) {
    btn.disabled = false;
    btn.textContent = 'Proses Pembayaran';
    showToast('Gagal menyimpan: ' + error.message, 'error');
  }
}

// Pendaftaran Service Worker untuk PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker didaftarkan!', reg))
      .catch(err => console.error('Service Worker gagal:', err));
  });
}

  </script>
